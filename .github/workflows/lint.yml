name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Fast code-quality checks ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Ruff lint
        run: ruff check nse-stock-analysis/scripts/

      - name: Ruff format check
        run: ruff format --check nse-stock-analysis/scripts/

  # ── Stage 2: Static type analysis ──────────────────────────────
  typecheck:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install type-checking dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install pandas numpy yfinance

      - name: Mypy type check
        run: mypy

  # ── Stage 3: Build validation & security audit ─────────────────
  build-verify:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install all runtime dependencies
        run: pip install -r requirements.txt

      - name: Verify all script imports resolve
        run: |
          cd nse-stock-analysis/scripts
          python -c "
          import importlib.util, sys, pathlib
          scripts = sorted(pathlib.Path('.').glob('*.py'))
          failed = []
          for s in scripts:
              mod_name = s.stem
              print(f'  Checking {mod_name}...', end=' ')
              try:
                  spec = importlib.util.spec_from_file_location(mod_name, str(s))
                  mod = importlib.util.module_from_spec(spec)
                  sys.path.insert(0, '.')
                  spec.loader.exec_module(mod)
                  print('OK')
              except Exception as e:
                  print(f'FAILED: {e}')
                  failed.append((mod_name, str(e)))
          if failed:
              print(f'\n{len(failed)} module(s) failed to import:')
              for name, err in failed:
                  print(f'  - {name}: {err}')
              sys.exit(1)
          print(f'\nAll {len(scripts)} modules imported successfully.')
          "

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit --strict --desc || true
